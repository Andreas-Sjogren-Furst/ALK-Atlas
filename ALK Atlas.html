document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e5af3195-a114-4cfe-99e9-8cea7279944d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\n:root{--navy:#0A1628;--navy2:#13233b;--teal:#00A896;--teal-d:#018f80;--grey:#F5F6FA;--line:#E5E8F0;--ink:#1A2233;--mut:#697089}\nhtml,body{height:100%}\nbody{font-family:'Public Sans',system-ui,sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}\n.root{height:100vh;overflow:hidden}\n.mono{font-family:'JetBrains Mono',monospace}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none}\ninput,select,textarea{font-family:inherit;font-size:14px}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-thumb{background:#cfd4e2;border-radius:6px;border:3px solid transparent;background-clip:padding-box}\n::-webkit-scrollbar-thumb:hover{background:#b6bccf;background-clip:padding-box}\n@keyframes spin{to{transform:rotate(360deg)}}\n@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}\n.fade{animation:fadeUp .35s ease both}\n.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}\n.spin.dark{border:2px solid rgba(0,0,0,.12);border-top-color:var(--teal)}\n/* layout */\n.app{display:flex;height:100vh}\n.side{width:240px;background:var(--navy);color:#cdd5e4;display:flex;flex-direction:column;flex-shrink:0;transition:width .22s ease}\n.side.col{width:64px}\n.side-top{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}\n.logo{width:30px;height:30px;border-radius:7px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#04201d;font-weight:700;font-size:15px;flex-shrink:0}\n.logo-tx{font-weight:700;color:#fff;font-size:15px;letter-spacing:.3px;white-space:nowrap}\n.logo-tx span{color:var(--teal)}\n.nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}\n.nav-i{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:#aab4c8;font-size:14px;font-weight:500;white-space:nowrap;transition:background .14s,color .14s;width:100%;text-align:left}\n.nav-i:hover{background:rgba(255,255,255,.06);color:#fff}\n.nav-i.on{background:var(--teal);color:#fff}\n.nav-i.on .ico{opacity:1}\n.ico{font-size:17px;width:20px;text-align:center;flex-shrink:0;opacity:.85}\n.side-bot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;font-size:12.5px;color:#9fb0c4;white-space:nowrap}\n.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18);flex-shrink:0}\n.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--grey)}\n.top{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 20px;flex-shrink:0;z-index:20}\n.crumb{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut);min-width:0}\n.crumb b{color:var(--ink);font-weight:600}\n.crumb-sep{opacity:.5}\n.collapse{color:var(--mut);font-size:18px;width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center}\n.collapse:hover{background:var(--grey)}\n.scroll{flex:1;overflow-y:auto}\n.wrap{max-width:1180px;margin:0 auto;padding:28px 32px 60px}\n/* user chip */\n.uchip{display:flex;align-items:center;gap:10px;padding:5px 8px 5px 5px;border-radius:30px;position:relative}\n.uchip:hover{background:var(--grey)}\n.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}\n.uchip .un{font-size:13.5px;font-weight:600;line-height:1.15}\n.uchip .ur{font-size:11.5px;color:var(--mut);line-height:1.15}\n.menu{position:absolute;top:48px;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 40px rgba(10,22,40,.16);width:230px;padding:7px;z-index:50;animation:fadeUp .15s ease both}\n.menu-h{padding:10px 12px 12px;border-bottom:1px solid var(--line);margin-bottom:6px}\n.menu-i{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13.5px;color:var(--ink);width:100%;text-align:left;font-weight:500}\n.menu-i:hover{background:var(--grey)}\n.menu-i.dz{color:#DC2626}\n/* badges */\n.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}\n.bdot{width:6px;height:6px;border-radius:50%}\n.st-Approved{background:#E3F6EC;color:#108043}.st-Approved .bdot{background:#108043}\n.st-Under.Review{}\n.s-review{background:#FEF1DC;color:#B45309}.s-review .bdot{background:#D97706}\n.s-progress{background:#E4EDFE;color:#1D4ED8}.s-progress .bdot{background:#2563EB}\n.s-draft{background:#EDEFF4;color:#5B6477}.s-draft .bdot{background:#6B7280}\n.s-rejected{background:#FCE6E6;color:#B91C1C}.s-rejected .bdot{background:#DC2626}\n.s-approved{background:#E3F6EC;color:#0F8040}.s-approved .bdot{background:#16A34A}\n.ty{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#EEF0F6;color:#4A5268;border:1px solid #e2e6f0}\n.ty.wetlab{background:#E7F5F3;color:#067a6e;border-color:#cdeae6}\n.ty.clinical{background:#EAEEFB;color:#3551b8;border-color:#d8e urn h('div',{className:'ov',onClick:()=>this.closeVoice()},\n      h('div',{className:'modal',style:{width:'440px',textAlign:'center'},onClick:e=>e.stopPropagation()},\n        h('div',{style:{padding:'30px 26px 24px'}},\n          h('div',{className:'vmic'+(v.phase==='listening'?'':' idle')}, v.phase==='answer'?'✦':'🎙'),\n          h('div',{style:{fontWeight:700,fontSize:'15px',marginTop:'20px',color:v.phase==='listening'?'var(--teal-d)':'var(--ink)'}},status),\n          v.phase==='thinking'?h('div',{className:'vwave',style:{marginTop:'14px'}},[0,1,2,3,4].map(i=>h('i',{key:i}))):null,\n          (v.query)?h('div',{style:{marginTop:'16px',fontSize:'16px',fontWeight:600,color:'var(--navy)',lineHeight:1.4}},'“'+v.query+(v.phase==='listening'?'':'”')+(v.phase==='listening'?'':'')) :null,\n          v.phase==='answer'?h('div',{style:{marginTop:'14px',padding:'14px 16px',background:'var(--grey)',borderRadius:'12px',fontSize:'14px',lineHeight:1.6,textAlign:'left',color:'#39415a'}},\n            h('div',{style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'8px',color:'var(--teal-d)',fontWeight:600,fontSize:'12px'}},h('div',{className:'vwave',style:{height:'16px'}},[0,1,2].map(i=>h('i',{key:i,style:{height:'10px'}}))),'Speaking'),\n            v.answer):null),\n        v.phase==='answer'?h('div',{className:'modal-f'},\n          h('button',{className:'btn btn-o',onClick:()=>this.openVoice()},'Ask again'),\n          h('button',{className:'btn btn-o',onClick:()=>{ const q=v.full; this.closeVoice(); this.nav('chatbot'); this.sendChat(q); }},'Open in chatbot'),\n          h('button',{className:'btn btn-p',onClick:()=>this.closeVoice()},'Done')):\n          h('div',{className:'modal-f'},h('button',{className:'btn btn-o',onClick:()=>this.closeVoice()},'Cancel'))));\n  }\n\n  // ===== shared =====\n  emptyState(title,sub){ const h=React.createElement; return h('div',{className:'wrap'},h('div',{className:'empty',style:{paddingTop:'70px'}},\n    h('div',{className:'ei
